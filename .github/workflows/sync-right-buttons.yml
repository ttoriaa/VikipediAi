name: Sync Right Buttons

on:
  schedule:
    - cron: "25 */6 * * *"
  workflow_dispatch:
    inputs:
      source_feed_url:
        description: "Source feed URL"
        required: false
        type: string
      limit:
        description: "Max button count"
        required: false
        type: string
      include_names:
        description: "Comma-separated names that must be included first"
        required: false
        type: string

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      SOURCE_FEED_URL: ${{ inputs.source_feed_url || vars.RIGHT_BUTTONS_SOURCE_FEED_URL || 'https://ttoriaa.github.io/vikipedia/assets/github-projects.json' }}
      RIGHT_BUTTONS_LIMIT: ${{ inputs.limit || vars.RIGHT_BUTTONS_LIMIT || '6' }}
      RIGHT_BUTTONS_INCLUDE_NAMES: ${{ inputs.include_names || vars.RIGHT_BUTTONS_INCLUDE_NAMES || 'vikipedia,VikipediAi' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Sync right buttons config
        run: |
          python scripts/sync_right_buttons.py \
            --source-feed-url "$SOURCE_FEED_URL" \
            --output assets/right-buttons.json \
            --limit "$RIGHT_BUTTONS_LIMIT" \
            --include-names "$RIGHT_BUTTONS_INCLUDE_NAMES"

      - name: Commit changes
        run: |
          if git diff --quiet -- assets/right-buttons.json; then
            echo "No right-button changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/right-buttons.json
          git commit -m "chore: sync VikipediAi right buttons"
          git push
