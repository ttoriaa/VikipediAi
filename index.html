<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>VikipediAi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg0: #f6f8f6;
      --bg1: #eaf1ed;
      --ink: #112018;
      --muted: #385247;
      --card: rgba(255, 255, 255, 0.84);
      --brandA: #115e59;
      --brandB: #1d4ed8;
      --shadow: 0 20px 50px rgba(17, 32, 24, 0.12);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      color: var(--ink);
      font-family: "Noto Sans SC", sans-serif;
      background:
        radial-gradient(1200px 700px at 0% 0%, #d9efe4 0%, rgba(217, 239, 228, 0) 56%),
        radial-gradient(900px 600px at 100% 0%, #dce8ff 0%, rgba(220, 232, 255, 0) 52%),
        linear-gradient(165deg, var(--bg0) 0%, var(--bg1) 100%);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
    }

    .shell {
      width: min(980px, 100%);
      border-radius: 28px;
      border: 1px solid rgba(17, 32, 24, 0.14);
      box-shadow: var(--shadow);
      background: linear-gradient(180deg, rgba(255,255,255,0.86), rgba(255,255,255,0.78));
      padding: 24px;
    }

    .top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border-radius: 999px;
      border: 1px solid rgba(17, 32, 24, 0.2);
      background: rgba(255, 255, 255, 0.9);
      color: var(--muted);
      font-size: 12px;
      padding: 6px 10px;
      font-family: "Space Grotesk", "Noto Sans SC", sans-serif;
    }

    .lang {
      border-radius: 999px;
      border: 1px solid rgba(17, 32, 24, 0.2);
      background: rgba(255, 255, 255, 0.9);
      color: var(--ink);
      font-size: 12px;
      padding: 7px 12px;
      cursor: pointer;
      font-family: "Space Grotesk", "Noto Sans SC", sans-serif;
    }

    h1 {
      margin: 0;
      font-size: clamp(34px, 6vw, 60px);
      line-height: 1.06;
      letter-spacing: -0.02em;
      font-family: "Space Grotesk", "Noto Sans SC", sans-serif;
    }

    .subtitle {
      margin: 10px 0 0;
      font-size: 17px;
      color: var(--muted);
      max-width: 760px;
      line-height: 1.55;
    }

    .cards {
      margin-top: 18px;
      display: grid;
      grid-template-columns: 1.2fr 1fr;
      gap: 12px;
    }

    .card {
      border-radius: 18px;
      border: 1px solid rgba(17, 32, 24, 0.12);
      background: var(--card);
      padding: 14px;
    }

    .card h2 {
      margin: 0 0 8px;
      font-size: 18px;
      font-family: "Space Grotesk", "Noto Sans SC", sans-serif;
    }

    .card p {
      margin: 0;
      color: var(--muted);
      line-height: 1.5;
      font-size: 14px;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 16px;
    }

    .btn {
      text-decoration: none;
      border-radius: 999px;
      padding: 10px 16px;
      font-family: "Space Grotesk", "Noto Sans SC", sans-serif;
      font-size: 14px;
      border: 1px solid rgba(17, 32, 24, 0.18);
      background: rgba(255, 255, 255, 0.9);
      color: var(--ink);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 18px rgba(17, 32, 24, 0.09);
    }

    .btn.primary {
      color: #fff;
      border-color: transparent;
      background: linear-gradient(120deg, var(--brandA), var(--brandB));
    }

    .footer {
      margin-top: 16px;
      color: var(--muted);
      font-size: 12px;
    }

    @media (max-width: 820px) {
      .cards {
        grid-template-columns: 1fr;
      }
      .shell {
        padding: 18px;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <div class="top">
      <span class="badge" id="versionText">version v2.2.0</span>
      <button class="lang" id="langBtn">EN</button>
    </div>

    <h1 id="title">VikipediAi</h1>
    <p class="subtitle" id="subtitle">面向 AI 产品与产业链研究的一页式可视化入口。</p>

    <section class="cards">
      <article class="card">
        <h2 id="card1Title">China vs Global AI Competition Map</h2>
        <p id="card1Desc">查看国内与国外 AI 生态中的直接竞争关系、上下游依赖，以及中美对位竞争关系。</p>
      </article>

      <article class="card">
        <h2 id="card2Title">What is included</h2>
        <p id="card2Desc">覆盖模型层、应用层、Agent 编排层与供给侧关系；支持投资视角、企业采购视角和 16:9 截图导出。</p>
      </article>
    </section>

    <div class="actions">
      <a class="btn primary" href="map.html" id="openMap">打开竞争关系图</a>
      <a class="btn" href="data/graph.json" target="_blank" rel="noreferrer" id="openData">查看 graph.json</a>
    </div>

    <p class="footer" id="footer">Maintained in repository ttoriaa/VikipediAi</p>
  </main>

  <script>
    (function () {
      const i18n = {
        zh: {
          version: "版本 v2.2.0",
          subtitle: "面向 AI 产品与产业链研究的一页式可视化入口。",
          card1Title: "中外 AI 竞争关系图",
          card1Desc: "查看国内与国外 AI 生态中的直接竞争关系、上下游依赖，以及中美对位竞争关系。",
          card2Title: "内容范围",
          card2Desc: "覆盖模型层、应用层、Agent 编排层与供给侧关系；支持投资视角、企业采购视角和 16:9 截图导出。",
          openMap: "打开竞争关系图",
          openData: "查看 graph.json",
          footer: "维护仓库：ttoriaa/VikipediAi"
        },
        en: {
          version: "version v2.2.0",
          subtitle: "A one-page visual entry point for AI product and value-chain research.",
          card1Title: "China vs Global AI Competition Map",
          card1Desc: "Explore direct competition, upstream dependencies, and China-US head-to-head rivalries in one map.",
          card2Title: "Coverage",
          card2Desc: "Includes model layer, app layer, agent orchestration, and supply-side links; with investor/procurement views and 16:9 export.",
          openMap: "Open Competition Map",
          openData: "Open graph.json",
          footer: "Maintained in repository: ttoriaa/VikipediAi"
        }
      };

      let lang = "zh";
      const langBtn = document.getElementById("langBtn");
      const versionText = document.getElementById("versionText");
      const subtitle = document.getElementById("subtitle");
      const card1Title = document.getElementById("card1Title");
      const card1Desc = document.getElementById("card1Desc");
      const card2Title = document.getElementById("card2Title");
      const card2Desc = document.getElementById("card2Desc");
      const openMap = document.getElementById("openMap");
      const openData = document.getElementById("openData");
      const footer = document.getElementById("footer");

      function apply() {
        const t = i18n[lang];
        versionText.textContent = t.version;
        subtitle.textContent = t.subtitle;
        card1Title.textContent = t.card1Title;
        card1Desc.textContent = t.card1Desc;
        card2Title.textContent = t.card2Title;
        card2Desc.textContent = t.card2Desc;
        openMap.textContent = t.openMap;
        openData.textContent = t.openData;
        footer.textContent = t.footer;
        langBtn.textContent = lang === "zh" ? "EN" : "中文";
        document.documentElement.lang = lang === "zh" ? "zh-CN" : "en";
      }

      langBtn.addEventListener("click", function () {
        lang = lang === "zh" ? "en" : "zh";
        apply();
      });

      apply();
    })();
  </script>
</body>
</html>
