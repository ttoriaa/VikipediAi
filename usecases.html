<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI Use Cases Tabs</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
  <style>
    :root {
      --bg0: #f8faf8;
      --bg1: #ecf3ef;
      --ink: #0f2018;
      --muted: #355347;
      --card: rgba(255,255,255,0.9);
      --line: rgba(15, 32, 24, 0.14);
      --brand: #0f766e;
      --brand2: #1d4ed8;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--ink);
      font-family: "Noto Sans SC", sans-serif;
      background:
        radial-gradient(1100px 700px at 0% -5%, #dcefe4 0%, rgba(220,239,228,0) 58%),
        radial-gradient(900px 600px at 100% 0%, #dce8ff 0%, rgba(220,232,255,0) 55%),
        linear-gradient(165deg, var(--bg0), var(--bg1));
      min-height: 100vh;
    }
    .page { max-width: 1280px; margin: 0 auto; padding: 24px 18px 36px; }
    @keyframes riseIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 8px;
    }
    .top a { color: var(--brand); text-decoration: none; }
    h1 {
      margin: 0;
      font-family: "Space Grotesk", "Noto Sans SC", sans-serif;
      font-size: clamp(30px, 5vw, 52px);
      line-height: 1.08;
      letter-spacing: -0.02em;
    }
    .subtitle {
      margin: 10px 0 0;
      color: var(--muted);
      line-height: 1.6;
      font-size: 16px;
    }
    .tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 14px 0 10px;
    }
    .tabs.category-tabs { margin-top: 16px; }
    .tabs.product-tabs {
      margin-top: 6px;
      padding-top: 10px;
      border-top: 1px dashed var(--line);
    }
    .tab-category {
      border: 1px solid var(--line);
      background: linear-gradient(150deg, rgba(255,255,255,0.95), rgba(234,242,255,0.82));
      color: #143228;
      border-radius: 12px;
      padding: 10px 16px;
      cursor: pointer;
      font-family: "Space Grotesk", "Noto Sans SC", sans-serif;
      font-size: 14px;
      font-weight: 700;
      transition: transform 160ms ease, box-shadow 160ms ease, background 160ms ease;
    }
    .tab-category:hover { transform: translateY(-1px); box-shadow: 0 8px 18px rgba(15, 32, 24, 0.08); }
    .tab-category.active {
      border-color: transparent;
      color: #fff;
      background: linear-gradient(120deg, #0b4a3a, #0d5b76);
      box-shadow: 0 10px 24px rgba(11, 74, 58, 0.28);
    }
    .tab-product {
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.9);
      color: var(--ink);
      border-radius: 999px;
      padding: 7px 13px;
      cursor: pointer;
      font-family: "Space Grotesk", "Noto Sans SC", sans-serif;
      font-size: 13px;
      font-weight: 500;
      transition: transform 160ms ease, box-shadow 160ms ease, background 160ms ease;
    }
    .tab-product:hover { transform: translateY(-1px); box-shadow: 0 8px 18px rgba(15, 32, 24, 0.08); }
    .tab-product.active {
      border-color: rgba(15, 118, 110, 0.55);
      background: linear-gradient(120deg, rgba(15, 118, 110, 0.16), rgba(29, 78, 216, 0.12));
      color: #0a5a54;
      font-weight: 700;
    }
    .panel {
      border: 1px solid var(--line);
      border-radius: 18px;
      background: var(--card);
      padding: 14px;
    }
    .panel h2 {
      margin: 0;
      font-size: 22px;
      font-family: "Space Grotesk", "Noto Sans SC", sans-serif;
    }
    .panel p {
      margin: 8px 0 0;
      color: var(--muted);
      line-height: 1.6;
      font-size: 14px;
    }
    .grid {
      margin-top: 12px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .section {
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(255,255,255,0.9);
      padding: 12px;
      animation: riseIn 260ms ease both;
    }
    .section.full { grid-column: 1 / -1; }
    .section h3 {
      margin: 0 0 7px;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
      font-family: "Space Grotesk", "Noto Sans SC", sans-serif;
    }
    .section p { margin: 0; }
    .section ul { margin: 0; padding-left: 18px; }
    .section li { margin: 0; line-height: 1.5; font-size: 14px; }
    .detail-case {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: rgba(255,255,255,0.92);
      padding: 10px;
      margin-bottom: 10px;
    }
    .detail-case:last-child { margin-bottom: 0; }
    .detail-case h4 {
      margin: 0;
      font-size: 15px;
      font-family: "Space Grotesk", "Noto Sans SC", sans-serif;
    }
    .detail-case p {
      margin: 6px 0 0;
      font-size: 13px;
      color: var(--muted);
      line-height: 1.5;
    }
    .detail-block { margin-top: 8px; }
    .detail-block strong {
      display: block;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--muted);
      margin-bottom: 4px;
    }
    .deep-head {
      margin: 0;
      font-size: 16px;
      font-family: "Space Grotesk", "Noto Sans SC", sans-serif;
    }
    .deep-grid {
      margin-top: 10px;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }
    .deep-grid .section { margin: 0; }
    .mermaid-wrap {
      margin-top: 10px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: rgba(255,255,255,0.94);
      padding: 10px;
      overflow-x: auto;
    }
    .mermaid { min-width: 540px; }
    .shots {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }
    .shot {
      border: 1px dashed rgba(15, 32, 24, 0.3);
      border-radius: 12px;
      background: linear-gradient(135deg, rgba(255,255,255,0.95), rgba(233,241,255,0.6));
      min-height: 180px;
      padding: 10px;
      display: grid;
      align-content: space-between;
      gap: 10px;
    }
    .shot-img {
      width: 100%;
      height: 170px;
      object-fit: cover;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255,255,255,0.75);
    }
    .shot-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: #0e5f58;
      text-decoration: none;
      font-size: 12px;
      font-family: "Space Grotesk", "Noto Sans SC", sans-serif;
    }
    .shot-link:hover { text-decoration: underline; }
    .shot strong { font-size: 13px; }
    .shot code {
      display: inline-block;
      font-size: 11px;
      color: var(--muted);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 2px 7px;
      background: rgba(255,255,255,0.92);
      word-break: break-all;
    }
    .shot p {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }
    .code-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      margin-top: 10px;
    }
    .code-card {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: rgba(255,255,255,0.94);
      padding: 10px;
    }
    .code-card h4 {
      margin: 0 0 6px;
      font-size: 14px;
      font-family: "Space Grotesk", "Noto Sans SC", sans-serif;
    }
    .code-card pre {
      margin: 0;
      overflow-x: auto;
      font-size: 12px;
      line-height: 1.5;
      background: rgba(240, 245, 249, 0.85);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px;
      white-space: pre;
    }
    .chips { display: flex; flex-wrap: wrap; gap: 8px; }
    .chip {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 5px 10px;
      font-size: 12px;
      line-height: 1.3;
      background: rgba(255,255,255,0.92);
      color: var(--ink);
    }
    .emphasis {
      border-left: 3px solid var(--brand);
      padding-left: 10px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;
    }
    .product-spotlight {
      border: 1px solid rgba(15, 118, 110, 0.28);
      border-radius: 14px;
      background: linear-gradient(160deg, rgba(220, 242, 236, 0.55), rgba(225, 235, 255, 0.45));
      padding: 12px;
      grid-column: 1 / -1;
    }
    .product-spotlight h3 {
      margin: 0 0 8px;
      font-size: 14px;
      color: #0e5f58;
      font-family: "Space Grotesk", "Noto Sans SC", sans-serif;
      letter-spacing: 0.02em;
      text-transform: none;
    }
    .spot-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }
    .spot-card {
      border: 1px solid rgba(15, 32, 24, 0.14);
      border-radius: 10px;
      background: rgba(255,255,255,0.88);
      padding: 10px;
    }
    .spot-card h4 {
      margin: 0 0 6px;
      font-size: 12px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--muted);
      font-family: "Space Grotesk", "Noto Sans SC", sans-serif;
    }
    .spot-card ul { margin: 0; padding-left: 16px; }
    .spot-card li { font-size: 13px; line-height: 1.45; margin: 0; }
    .matrix-wrap {
      overflow-x: auto;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: rgba(255,255,255,0.95);
    }
    .storyline-block {
      border: 1px solid rgba(15, 118, 110, 0.24);
      border-radius: 14px;
      background: linear-gradient(160deg, rgba(220, 242, 236, 0.55), rgba(225, 235, 255, 0.45));
      padding: 12px;
      grid-column: 1 / -1;
    }
    .storyline-block h3 {
      margin: 0 0 8px;
      font-size: 14px;
      color: #0e5f58;
      font-family: "Space Grotesk", "Noto Sans SC", sans-serif;
      text-transform: none;
      letter-spacing: 0.02em;
    }
    .market-map {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: rgba(255,255,255,0.95);
      padding: 10px;
    }
    .market-stage {
      position: relative;
      min-height: 360px;
      border: 1px dashed rgba(15, 32, 24, 0.24);
      border-radius: 12px;
      background:
        linear-gradient(to right, rgba(15, 32, 24, 0.04) 1px, transparent 1px) 0 0 / 20% 100%,
        linear-gradient(to top, rgba(15, 32, 24, 0.04) 1px, transparent 1px) 0 0 / 100% 20%;
      overflow: hidden;
    }
    .market-axis-x,
    .market-axis-y {
      position: absolute;
      color: var(--muted);
      font-size: 11px;
      font-family: "Space Grotesk", "Noto Sans SC", sans-serif;
      background: rgba(255,255,255,0.85);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 3px 8px;
    }
    .market-axis-x { right: 8px; bottom: 8px; }
    .market-axis-y {
      left: 8px;
      top: 8px;
      transform: rotate(-90deg);
      transform-origin: left top;
    }
    .bubble {
      position: absolute;
      border-radius: 999px;
      border: 1px solid rgba(15, 32, 24, 0.2);
      display: grid;
      place-items: center;
      text-align: center;
      padding: 6px;
      color: #0f2018;
      font-size: 11px;
      line-height: 1.25;
      box-shadow: 0 8px 20px rgba(15, 32, 24, 0.15);
      pointer-events: auto;
    }
    .bubble strong {
      display: block;
      font-family: "Space Grotesk", "Noto Sans SC", sans-serif;
      font-size: 11px;
    }
    .bubble small { font-size: 10px; color: #244437; }
    .market-legend {
      margin-top: 8px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--muted);
    }
    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      border: 1px solid rgba(15, 32, 24, 0.2);
    }
    table.matrix {
      width: 100%;
      border-collapse: collapse;
      min-width: 980px;
      font-size: 13px;
    }
    .matrix th,
    .matrix td {
      border-bottom: 1px solid var(--line);
      border-right: 1px solid var(--line);
      padding: 9px;
      vertical-align: top;
      text-align: left;
    }
    .matrix th:last-child,
    .matrix td:last-child { border-right: 0; }
    .matrix tr:last-child td { border-bottom: 0; }
    .matrix th {
      position: sticky;
      top: 0;
      background: #f1f7f4;
      font-family: "Space Grotesk", "Noto Sans SC", sans-serif;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--muted);
    }
    .meta { margin-top: 12px; color: var(--muted); font-size: 12px; }
    .product-gateway {
      border: 1px solid rgba(15, 118, 110, 0.24);
      border-radius: 14px;
      background: linear-gradient(160deg, rgba(220, 242, 236, 0.5), rgba(225, 235, 255, 0.4));
      padding: 12px;
      grid-column: 1 / -1;
    }
    .product-gateway h3 {
      margin: 0 0 8px;
      font-size: 14px;
      color: #0e5f58;
      font-family: "Space Grotesk", "Noto Sans SC", sans-serif;
      letter-spacing: 0.02em;
      text-transform: none;
    }
    .gateway-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }
    .gateway-card {
      border: 1px solid rgba(15, 32, 24, 0.14);
      border-radius: 12px;
      background: rgba(255,255,255,0.92);
      padding: 10px;
      display: grid;
      gap: 8px;
    }
    .gateway-card h4 {
      margin: 0;
      font-size: 15px;
      font-family: "Space Grotesk", "Noto Sans SC", sans-serif;
    }
    .gateway-card p {
      margin: 0;
      font-size: 13px;
      color: var(--muted);
      line-height: 1.5;
    }
    .gateway-actions { display: flex; flex-wrap: wrap; gap: 8px; }
    .gateway-link {
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255,255,255,0.95);
      color: #0e5f58;
      text-decoration: none;
      font-size: 12px;
      line-height: 1.2;
      padding: 5px 10px;
      font-family: "Space Grotesk", "Noto Sans SC", sans-serif;
    }
    .gateway-link:hover { background: rgba(220, 242, 236, 0.6); }
    .collapse-control {
      margin-top: 10px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 6px 12px;
      background: rgba(255,255,255,0.95);
      color: #0e5f58;
      font-size: 12px;
      font-family: "Space Grotesk", "Noto Sans SC", sans-serif;
      cursor: pointer;
    }
    .collapse-control:hover { background: rgba(220, 242, 236, 0.6); }
    .section.collapsible .collapse-toggle {
      margin-top: 8px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255,255,255,0.95);
      color: #0e5f58;
      font-size: 12px;
      padding: 4px 10px;
      font-family: "Space Grotesk", "Noto Sans SC", sans-serif;
      cursor: pointer;
    }
    .section.collapsible .collapse-toggle:hover { background: rgba(220, 242, 236, 0.6); }
    .section.collapsible.is-collapsed .collapsible-body { display: none; }

    @media (max-width: 980px) {
      .grid { grid-template-columns: 1fr; }
      .shots { grid-template-columns: 1fr; }
      .deep-grid { grid-template-columns: 1fr; }
      .page { padding: 18px 12px 26px; }
      .panel { padding: 12px; border-radius: 14px; }
      .panel h2 { font-size: 20px; }
      .subtitle { font-size: 14px; }
      .tab-category { font-size: 12px; padding: 8px 12px; border-radius: 10px; }
      .tab-product { font-size: 12px; padding: 7px 10px; }
      .section { padding: 10px; border-radius: 12px; }
      .spot-grid { grid-template-columns: 1fr; }
      .gateway-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="top">
      <a href="index.html">返回导航页</a>
      <span id="meta"></span>
    </div>

    <h1>应用层分类与产品场景 Tabs</h1>
    <p class="subtitle">第一层是应用层分类，第二层是分类内产品。每个分类先给行业视角，每个产品再给专属能力、场景与 demo。</p>

    <nav class="tabs category-tabs" id="categoryTabs"></nav>
    <nav class="tabs product-tabs" id="productTabs"></nav>

    <section class="panel" id="panel"></section>
    <p class="meta" id="anchorNote"></p>
  </main>

  <script>
    (function () {
      if (window.mermaid && typeof window.mermaid.initialize === "function") {
        window.mermaid.initialize({ startOnLoad: false, securityLevel: "loose", theme: "default" });
      }

      const categoryTabsEl = document.getElementById("categoryTabs");
      const productTabsEl = document.getElementById("productTabs");
      const panelEl = document.getElementById("panel");
      const metaEl = document.getElementById("meta");
      const anchorNote = document.getElementById("anchorNote");

      const state = {
        data: null,
        activeCategoryId: null,
        activeProductId: null
      };
      const GENERAL_TAB_ID = "__general__";

      function list(items) {
        return (items || []).map(function (x) { return "<li>" + x + "</li>"; }).join("");
      }

      function chips(items) {
        return (items || []).map(function (x) { return "<span class='chip'>" + x + "</span>"; }).join("");
      }

      function normalizeText(text) {
        return String(text || "")
          .toLowerCase()
          .replace(/[\s\-_,.:;()\[\]{}'"`~!?@#$%^&*+=|\\/<>]+/g, "")
          .trim();
      }

      function isSemanticDuplicate(a, b) {
        const na = normalizeText(a);
        const nb = normalizeText(b);
        if (!na || !nb) return false;
        if (na === nb) return true;
        if (na.length >= 8 && nb.includes(na)) return true;
        if (nb.length >= 8 && na.includes(nb)) return true;
        return false;
      }

      function dedupeBySemantic(items) {
        const out = [];
        (items || []).forEach(function (item) {
          if (!item) return;
          const exists = out.some(function (x) { return isSemanticDuplicate(x, item); });
          if (!exists) out.push(item);
        });
        return out;
      }

      function dedupeFeaturesAndScenarios(product) {
        const features = dedupeBySemantic(product.performance_and_features || []);
        const scenarios = dedupeBySemantic(product.scenarios || []).filter(function (s) {
          return !features.some(function (f) { return isSemanticDuplicate(f, s); });
        });
        return { features: features, scenarios: scenarios };
      }

      function renderMatrix(rows) {
        if (!Array.isArray(rows) || !rows.length) return "";
        return "" +
          "<div class='matrix-wrap'><table class='matrix'>" +
            "<thead><tr>" +
              "<th>产品</th>" +
              "<th>厂商</th>" +
              "<th>最佳适配团队</th>" +
              "<th>核心优势</th>" +
              "<th>治理成熟度</th>" +
              "<th>部署形态</th>" +
              "<th>主要风险提示</th>" +
            "</tr></thead>" +
            "<tbody>" + rows.map(function (r) {
              return "<tr>" +
                "<td>" + (r.product || "") + "</td>" +
                "<td>" + (r.vendor || "") + "</td>" +
                "<td>" + (r.fit || "") + "</td>" +
                "<td>" + (r.strengths || "") + "</td>" +
                "<td>" + (r.governance || "") + "</td>" +
                "<td>" + (r.deployment || "") + "</td>" +
                "<td>" + (r.risk_note || "") + "</td>" +
              "</tr>";
            }).join("") + "</tbody>" +
          "</table></div>";
      }

      function escapeHtml(text) {
        return String(text || "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/\"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function renderBusinessCases(cases) {
        if (!Array.isArray(cases) || cases.length === 0) return "";
        return cases.map(function (item) {
          return "" +
            "<article class='detail-case'>" +
              "<h4>" + (item.title || "Case") + "</h4>" +
              (item.business_goal ? "<p><strong>Business Goal:</strong> " + item.business_goal + "</p>" : "") +
              (item.background ? "<p><strong>Background:</strong> " + item.background + "</p>" : "") +
              (item.workflow ? "<div class='detail-block'><strong>Workflow</strong><ul>" + list(item.workflow) + "</ul></div>" : "") +
              (item.systems ? "<div class='detail-block'><strong>System Integration</strong><ul>" + list(item.systems) + "</ul></div>" : "") +
              (item.deliverables ? "<div class='detail-block'><strong>Deliverables</strong><ul>" + list(item.deliverables) + "</ul></div>" : "") +
              (item.kpis ? "<div class='detail-block'><strong>KPI Targets</strong><ul>" + list(item.kpis) + "</ul></div>" : "") +

      function sanitizeMermaidLabel(text) {
        return String(text || "").replace(/["<>]/g, "").replace(/\s+/g, " ").trim().slice(0, 24);

      function buildStorylineMermaid(product) {
        const firstCase = (((product || {}).business_details || {}).marketing_service || [])[0];
        let steps = [];
        if (firstCase && Array.isArray(firstCase.workflow) && firstCase.workflow.length) {
          steps = firstCase.workflow;
        } else if (product && product.deep_dive && Array.isArray(product.deep_dive.workflow) && product.deep_dive.workflow.length) {
          steps = product.deep_dive.workflow;
        } else if (product && Array.isArray(product.scenarios) && product.scenarios.length) {
          steps = product.scenarios;
        }

        steps = dedupeBySemantic(steps).slice(0, 5).map(sanitizeMermaidLabel).filter(Boolean);
        if (steps.length < 2) return "";

        const nodeIds = ["A", "B", "C", "D", "E", "F"];
        const lines = ["graph LR", "S[触发场景]"];
        steps.forEach(function (step, idx) {
          lines.push(nodeIds[idx] + "[" + step + "]");
        });
        lines.push("R[业务结果]");
        lines.push("S --> " + nodeIds[0]);
        for (let i = 0; i < steps.length - 1; i += 1) {
          lines.push(nodeIds[i] + " --> " + nodeIds[i + 1]);
        }
        lines.push(nodeIds[steps.length - 1] + " --> R");
        return lines.join("\n");
      }

      function scoreByKeywords(text, highWords, lowWords, midWords) {
        const src = String(text || "").toLowerCase();
        if (highWords.some(function (w) { return src.includes(w); })) return 4.5;
        if (lowWords.some(function (w) { return src.includes(w); })) return 2.2;
        if (midWords.some(function (w) { return src.includes(w); })) return 3.3;
        return 3.5;
      }

      function buildMarketBubbleData(rows) {
        return (rows || []).map(function (r) {
          const governance = scoreByKeywords(r.governance, ["高", "成熟", "完善", "high", "mature"], ["低", "弱", "不足", "low"], ["中", "一般", "medium"]);
          const deployment = scoreByKeywords(r.deployment, ["混合", "私有", "on-prem", "hybrid", "local"], ["单一", "locked"], ["云", "cloud"]);
          const risk = scoreByKeywords(r.risk_note, ["低", "可控", "low"], ["高", "重大", "high"], ["中", "medium"]);
          const size = 34 + governance * 5 + (5 - risk) * 3;
          const x = 8 + ((governance - 1) / 4) * 82;
          const y = 88 - ((deployment - 1) / 4) * 72;
          let color = "rgba(163, 230, 53, 0.55)";
          const dep = String(r.deployment || "").toLowerCase();
          if (dep.includes("cloud") || dep.includes("云")) color = "rgba(96, 165, 250, 0.55)";
          if (dep.includes("混合") || dep.includes("hybrid")) color = "rgba(52, 211, 153, 0.55)";
          if (dep.includes("私有") || dep.includes("local") || dep.includes("on-prem")) color = "rgba(250, 204, 21, 0.55)";
          return {
            product: r.product || "",
            vendor: r.vendor || "",
            x: x,
            y: y,
            size: size,
            color: color,
            governance: governance,
            deployment: deployment
          };
        });
      }

              "营销服系统集成开发：加速 CRM、CDP、工单系统、WhatsApp/邮件渠道连接器开发，支持线索-服务闭环自动化。",
              "区域化运营自动化：按国家时区、渠道与库存策略生成自动化任务流，提升海外运营协同效率。",
              "合规与质量保障：在代码与流程层引入数据合规检查、审计日志与回滚方案，降低出海运营风险。"
            ],
            deliverables: [
              "多语言落地页与埋点模板仓库",
              "线索分发与客服工单自动化脚本",
              "出海营销服数据看板 SQL/ETL 模板"
            ]
          };
        }

        return null;
      }

      function renderCollapsibleSection(title, innerHtml, idSuffix) {
        if (!innerHtml) return "";
        return "" +
          "<article class='section full collapsible is-collapsed' data-collapsible-id='" + idSuffix + "'>" +
            "<h3>" + title + "</h3>" +
            "<button class='collapse-toggle' type='button' data-collapse-target='" + idSuffix + "'>展开</button>" +
            "<div class='collapsible-body'>" + innerHtml + "</div>" +
          "</article>";
      }

      function bindCollapsibles() {
        Array.from(panelEl.querySelectorAll(".collapse-toggle")).forEach(function (btn) {
          btn.addEventListener("click", function () {
            const target = btn.getAttribute("data-collapse-target");
            const box = panelEl.querySelector(".section.collapsible[data-collapsible-id='" + target + "']");
            if (!box) return;
            const collapsed = box.classList.toggle("is-collapsed");
            btn.textContent = collapsed ? "展开" : "折叠";
          });
        });

        const toggleAll = panelEl.querySelector("#toggleLongSections");
        if (toggleAll) {
          toggleAll.addEventListener("click", function () {
            const sections = Array.from(panelEl.querySelectorAll(".section.collapsible"));
            const hasCollapsed = sections.some(function (s) { return s.classList.contains("is-collapsed"); });
            sections.forEach(function (s) {
              s.classList.toggle("is-collapsed", !hasCollapsed);
              const id = s.getAttribute("data-collapsible-id");
              const btn = panelEl.querySelector(".collapse-toggle[data-collapse-target='" + id + "']");
              if (btn) btn.textContent = hasCollapsed ? "折叠" : "展开";
            });
            toggleAll.textContent = hasCollapsed ? "折叠长内容" : "展开长内容";
          });
        }
      }

      function renderCategoryTabs() {
        categoryTabsEl.innerHTML = (state.data.categories || []).map(function (cat) {
          return "<button class='tab-category" + (cat.id === state.activeCategoryId ? " active" : "") + "' type='button' data-category-id='" + cat.id + "'>" + cat.title_zh + "</button>";
        }).join("");

        Array.from(categoryTabsEl.querySelectorAll(".tab-category")).forEach(function (btn) {
          btn.addEventListener("click", function () {
            const id = btn.getAttribute("data-category-id");
            state.activeCategoryId = id;
            state.activeProductId = GENERAL_TAB_ID;
            anchorNote.textContent = "当前分类总览：" + (activeCategory() ? activeCategory().title_zh : "");
            renderCategoryTabs();
            renderProductTabs();
            renderPanel();
            updateHash();
          });
        });
      }

      function renderProductTabs() {
        const cat = activeCategory();
        const products = (cat && cat.products) ? cat.products : [];
        productTabsEl.innerHTML = "<button class='tab-product" + (state.activeProductId === GENERAL_TAB_ID ? " active" : "") + "' type='button' data-product-id='" + GENERAL_TAB_ID + "'>General</button>" +
          products.map(function (p) {
            return "<button class='tab-product" + (p.id === state.activeProductId ? " active" : "") + "' type='button' data-product-id='" + p.id + "'>" + p.name_zh + "</button>";
          }).join("");

        Array.from(productTabsEl.querySelectorAll(".tab-product")).forEach(function (btn) {
          btn.addEventListener("click", function () {
            state.activeProductId = btn.getAttribute("data-product-id");
            if (state.activeProductId === GENERAL_TAB_ID) {
              anchorNote.textContent = "当前分类总览：" + (activeCategory() ? activeCategory().title_zh : "");
            } else {
              const product = activeProduct();
              anchorNote.textContent = "当前已按产品锚点定位：" + (product ? product.name_zh : "");
            }
            renderProductTabs();
            renderPanel();
            updateHash();
          });
        });
      }

      function renderPanel() {
        const cat = activeCategory();
        const product = activeProduct();
        if (!cat) {
          panelEl.innerHTML = "<p>暂无数据</p>";
          return;
        }

        if (state.activeProductId === GENERAL_TAB_ID || !product) {
          panelEl.innerHTML = "" +
            "<h2>" + cat.title_zh + " / General</h2>" +
            "<p>" + (cat.overview && cat.overview.intro ? cat.overview.intro : "") + "</p>" +
            "<div class='grid'>" +
              "<article class='section'><h3>类别使用场景</h3><ul>" + list((cat.overview || {}).use_cases) + "</ul></article>" +
              "<article class='section'><h3>市场表现</h3><ul>" + list((cat.overview || {}).market_performance) + "</ul></article>" +
              "<article class='section'><h3>客户使用方式</h3><ul>" + list((cat.overview || {}).customer_usage) + "</ul></article>" +
              "<article class='section'><h3>发展趋势</h3><ul>" + list((cat.overview || {}).trends) + "</ul></article>" +

              (cat.specification && Array.isArray(cat.specification.market_players) && cat.specification.market_players.length ? "<article class='section full'><h3>市场主要玩家（尽量全面）</h3><div class='chips'>" + chips(cat.specification.market_players) + "</div></article>" : "") +
              (cat.specification && cat.specification.coverage_statement ? "<article class='section full'><h3>厂商覆盖声明</h3><p class='emphasis'>" + cat.specification.coverage_statement + "</p></article>" : "") +
              (cat.specification && cat.specification.last_reviewed ? "<article class='section full'><h3>更新日期</h3><p class='emphasis'>" + cat.specification.last_reviewed + "</p></article>" : "") +
              (cat.specification && Array.isArray(cat.specification.watchlist) && cat.specification.watchlist.length ? "<article class='section full'><h3>待观察名单</h3><ul>" + list(cat.specification.watchlist) + "</ul></article>" : "") +
              (cat.specification && Array.isArray(cat.specification.core_use_cases) && cat.specification.core_use_cases.length ? "<article class='section'><h3>核心用途清单</h3><ul>" + list(cat.specification.core_use_cases) + "</ul></article>" : "") +
              (cat.specification && Array.isArray(cat.specification.selection_criteria) && cat.specification.selection_criteria.length ? "<article class='section'><h3>选型标准</h3><ul>" + list(cat.specification.selection_criteria) + "</ul></article>" : "") +
              (cat.specification && Array.isArray(cat.specification.implementation_patterns) && cat.specification.implementation_patterns.length ? "<article class='section'><h3>落地模式</h3><ul>" + list(cat.specification.implementation_patterns) + "</ul></article>" : "") +
              (cat.specification && Array.isArray(cat.specification.risks_and_controls) && cat.specification.risks_and_controls.length ? "<article class='section'><h3>风险与控制</h3><ul>" + list(cat.specification.risks_and_controls) + "</ul></article>" : "") +
              (cat.specification && Array.isArray(cat.specification.comparison_matrix) && cat.specification.comparison_matrix.length ? renderMarketBubble(cat.specification.comparison_matrix) : "") +
              (cat.specification && Array.isArray(cat.specification.comparison_matrix) && cat.specification.comparison_matrix.length ? "<article class='section full'><h3>管理层评审：产品对比矩阵</h3>" + renderMatrix(cat.specification.comparison_matrix) + "</article>" : "") +

              renderProductGateway(cat) +
            "</div>";
          return;
        }

        const autoFocus = autoOverseasFocus(cat, product);
        const deduped = dedupeFeaturesAndScenarios(product);
        const usecaseCatalogHtml = (product.usecase_catalog ? "<div class='grid'>" +
            "<section class='section'><h3>需求与规划</h3><ul>" + list(product.usecase_catalog.ideation_and_planning) + "</ul></section>" +
            "<section class='section'><h3>编码与重构</h3><ul>" + list(product.usecase_catalog.coding_and_refactor) + "</ul></section>" +
            "<section class='section'><h3>测试与质量</h3><ul>" + list(product.usecase_catalog.testing_and_quality) + "</ul></section>" +
            "<section class='section'><h3>评审与安全</h3><ul>" + list(product.usecase_catalog.review_and_security) + "</ul></section>" +
            "<section class='section'><h3>发布与运维</h3><ul>" + list(product.usecase_catalog.release_and_ops) + "</ul></section>" +
            "<section class='section'><h3>数据与自动化</h3><ul>" + list(product.usecase_catalog.data_and_automation) + "</ul></section>" +
          "</div>" : "");
        const businessDetailsHtml = "" +
          (product.business_details && Array.isArray(product.business_details.marketing_service) && product.business_details.marketing_service.length ? "<article class='section full'><h3>Marketing Service Detailed Cases</h3>" + renderBusinessCases(product.business_details.marketing_service) + "</article>" : "") +
          (product.business_details && Array.isArray(product.business_details.rd) && product.business_details.rd.length ? "<article class='section full'><h3>R&D Detailed Cases</h3>" + renderBusinessCases(product.business_details.rd) + "</article>" : "");
        const screenshotsHtml = renderScreenshots(getScreenshotsForProduct(product));

        panelEl.innerHTML = "" +
          "<h2>" + cat.title_zh + " / " + product.name_zh + "</h2>" +
          "<p>产品页：聚焦该产品的差异化能力、适配团队与可交付内容。共有行业信息请切回 General。</p>" +
          "<button id='toggleLongSections' class='collapse-control' type='button'>展开长内容</button>" +
          "<div class='grid'>" +
            renderProductSpotlight(product) +

            (autoFocus ? "<article class='section full'><h3>" + autoFocus.title + "</h3><ul>" + list(autoFocus.bullets) + "</ul></article>" : "") +
            (autoFocus && Array.isArray(autoFocus.deliverables) && autoFocus.deliverables.length ? "<article class='section'><h3>建议交付件（汽车营销服）</h3><ul>" + list(autoFocus.deliverables) + "</ul></article>" : "") +

            "<article class='section full'><h3>产品介绍</h3><p>" + (product.product_intro || "") + "</p></article>" +
            renderStoryline(product) +
            ((product.company || product.region) ? "<article class='section full'><h3>厂商与区域</h3><div class='emphasis'>" + (product.company ? ("Company: " + product.company) : "") + (product.company && product.region ? " | " : "") + (product.region ? ("Region: " + product.region) : "") + "</div></article>" : "") +
            (deduped.features.length ? "<article class='section'><h3>性能与功能（去重）</h3><ul>" + list(deduped.features) + "</ul></article>" : "") +
            (deduped.scenarios.length ? "<article class='section'><h3>产品可实现场景（去重）</h3><ul>" + list(deduped.scenarios) + "</ul></article>" : "") +
            "<article class='section full'><h3>可交付 Demo</h3><ul>" + list(product.demo_deliverables) + "</ul></article>" +
            (Array.isArray(product.evaluation_spec) && product.evaluation_spec.length ? "<article class='section'><h3>评估建议</h3><ul>" + list(product.evaluation_spec) + "</ul></article>" : "") +
            (Array.isArray(product.common_gaps) && product.common_gaps.length ? "<article class='section'><h3>常见短板/注意点</h3><ul>" + list(product.common_gaps) + "</ul></article>" : "") +
            renderCollapsibleSection("产品用途全景（Specification）", usecaseCatalogHtml, "usecase-catalog") +
            renderCollapsibleSection("详细案例（Marketing / R&D）", businessDetailsHtml, "business-cases") +
            (product.deep_dive ? ("<article class='section full collapsible is-collapsed' data-collapsible-id='deep-dive'><h3>Instrumentation Deep Dive</h3><button class='collapse-toggle' type='button' data-collapse-target='deep-dive'>展开</button><div class='collapsible-body'>" + renderDeepDive(product.deep_dive).replace("<article class='section full'>", "<div class='nested-deep'>").replace("</article>", "</div>") + "</div></article>") : "") +
            renderCollapsibleSection("案例截图 / 网站与IDE参考", screenshotsHtml, "screenshots") +
          "</div>";

        bindCollapsibles();
        renderMermaid();
      }

      function updateHash() {
        const cat = activeCategory();
        const product = activeProduct();
        const targetId = (state.activeProductId === GENERAL_TAB_ID || !product) ? (cat ? cat.id : "") : product.id;
        if (targetId) {
          const url = new URL(window.location.href);
          url.hash = encodeURIComponent(targetId);
          history.replaceState(null, "", url.pathname + url.search + "#" + encodeURIComponent(targetId));
        }
      }

      function resolveInitialState() {
        const categories = state.data.categories || [];
        const hash = decodeURIComponent((location.hash || "").replace(/^#/, ""));

        if (!categories.length) return;

        if (hash) {
          const catHit = categories.find(function (c) { return c.id === hash; });
          if (catHit) {
            state.activeCategoryId = catHit.id;
            state.activeProductId = GENERAL_TAB_ID;
            anchorNote.textContent = "当前分类总览：" + catHit.title_zh;
            return;
          }

          for (let i = 0; i < categories.length; i += 1) {
            const cat = categories[i];
            const p = (cat.products || []).find(function (x) { return x.id === hash; });
            if (p) {
              state.activeCategoryId = cat.id;
              state.activeProductId = p.id;
              anchorNote.textContent = "当前已按产品锚点定位：" + p.name_zh;
              return;
            }
          }
        }

        state.activeCategoryId = categories[0].id;
        state.activeProductId = GENERAL_TAB_ID;
        anchorNote.textContent = "当前分类总览：" + categories[0].title_zh;
      }

      fetch("data/usecases.json?v=2.3.0").then(function (r) { return r.json(); }).then(function (json) {
        state.data = json;
        metaEl.textContent = json.meta.version + " | " + json.meta.updated;
        resolveInitialState();
        renderCategoryTabs();
        renderProductTabs();
        renderPanel();
      }).catch(function (err) {
        panelEl.innerHTML = "<p>数据加载失败：" + String(err) + "</p>";
      });
    })();
  </script>
</body>
</html>
